aos-lib:
  remote: https://github.com/michalsnik/aos
  version: 2.3.1
  license:
    name: MIT
    url: https://github.com/michalsnik/aos/blob/master/LICENSE
    gpl-compatible: true
  js:
    js/aos.js: { weight: -10 } # <--- Agregamos peso negativo para que cargue antes
  css:
    theme:
      https://unpkg.com/aos@2.3.1/dist/aos.css: { type: external }

splide:
  remote: https://github.com/splidejs/splide
  version: 4.1.4
  license:
    name: MIT
    url: https://github.com/splidejs/splide/blob/master/LICENSE
    gpl-compatible: true
  css:
    theme:
      https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css:
        { type: external }
  js:
    https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js:
      { type: external, minified: true }

fancybox:
  remote: https://github.com/fancyapps/ui
  version: 6.1
  license:
    name: GPLv3 # Fancybox UI v6 tiene términos específicos, usualmente GPLv3 para open source
    url: https://fancyapps.com/legal/license/
    gpl-compatible: true
  css:
    theme:
      https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.css:
        { type: external }
  js:
    https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.umd.js:
      { type: external, minified: true }
chatbot-widget:
  version: 5.x
  css:
    theme:
      assets/index-Cwatq9uM.css: {}
  js:
    assets/index-BFLZlGRW.js: { attributes: { type: module } }
global-styling:
  version: 70.x
  css:
    theme:
      css/styles.css: {}
      css/stylesvisit.css: {}
      https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap:
        { type: external }
  js:
    js/main.js: { weight: 0 }
  dependencies:
    - core/drupal
    - core/once
    - core/drupalSettings
    - visit_theme/aos-lib
    - visit_theme/splide
    - visit_theme/fancybox
