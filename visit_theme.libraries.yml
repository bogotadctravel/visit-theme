aos-lib:
  css:
    theme:
      https://unpkg.com/aos@2.3.1/dist/aos.css:
        type: external
  js:
    js/aos.js: { minified: true } # Aquí va el archivo descargado de la CDN
splide:
  css:
    theme:
      https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css:
        type: external
  js:
    https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js:
      type: external
      minified: true

fancybox:
  css:
    theme:
      https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.css:
        type: external
  js:
    https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.umd.js:
      type: external
      minified: true

global-styling:
  version: 10.x

  css:
    theme:
      css/styles.css: {}
      css/stylesvisit.css: {}

      https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap:
        type: external

  js:
    js/main.js: {}

  dependencies:
    - core/drupal
    - core/once
    - core/drupalSettings
    - visit_theme/aos-lib
    - visit_theme/splide
    - visit_theme/fancybox
