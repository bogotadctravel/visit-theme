aos-lib:
  remote: https://github.com/michalsnik/aos
  version: 2.3.1
  license:
    name: MIT
    url: https://github.com/michalsnik/aos/blob/master/LICENSE
    gpl-compatible: true
  js:
    js/aos.js: { weight: -10, attributes: { defer: true } }
  css:
    theme:
      https://unpkg.com/aos@2.3.1/dist/aos.css: { type: external }

splide:
  remote: https://github.com/splidejs/splide
  version: 4.1.4
  license:
    name: MIT
    url: https://github.com/splidejs/splide/blob/master/LICENSE
    gpl-compatible: true
  css:
    theme:
      https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css:
        { type: external }
  js:
    https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js:
      { type: external, minified: true, attributes: { defer: true } }

fancybox:
  remote: https://github.com/fancyapps/ui
  version: 6.1
  license:
    name: GPLv3
    url: https://fancyapps.com/legal/license/
    gpl-compatible: true
  css:
    theme:
      https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.css:
        { type: external }
  js:
    https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.umd.js:
      { type: external, minified: true, attributes: { defer: true } }
chatbot-widget:
  version: 5.x
  css:
    theme:
      assets/index-Cwatq9uM.css: {}
  js:
    assets/index-BFLZlGRW.js: { attributes: { type: module, defer: true } }
global-styling:
  version: 72.x
  css:
    theme:
      css/styles.css: {}
      css/stylesvisit.css: {}
      https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap:
        { type: external }
  js:
    js/main.js: { weight: 0, attributes: { defer: true } }
  dependencies:
    - core/drupal
    - core/once
    - core/drupalSettings
    - visit_theme/aos-lib
    - visit_theme/splide
    - visit_theme/fancybox
